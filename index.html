<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стартап | Скоро запуск</title>
    <meta name="description" content="Инновационная технологическая платформа.">
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    <div class="glass-container">
        <h1>Мы создаем <span class="highlight">будущее</span></h1>
        <p>Бэкенд уже в работе. Скоро здесь появится наш продукт.</p>
        
        <div class="interaction-area">
            <button id="notify-btn" class="glow-btn">Узнать первым</button>
        </div>
        
        <div class="status-indicator">
            <span class="dot"></span> Система инициализируется...
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
