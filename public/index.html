<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ai-Chef — Умные рецепты</title>
  <meta name="description" content="Распознавание продуктов в холодильнике и генерация рецептов" />
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app-container">
    
    <!-- Header -->
    <header class="app-header">
      <div class="brand-logo">Ai-Chef</div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-prefs" title="Настройки">
          <i class="fa-solid fa-sliders"></i>
        </button>
        <div id="auth-area">
          <!-- Injected via app.js -->
          <button class="icon-btn" id="btn-login-trigger">
            <i class="fa-regular fa-user"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Main View: Camera/Scanner -->
    <main class="hero-view">
      
      <!-- Photo Drop/Viewport -->
      <section class="scanner-viewport" id="upload-zone">
        <input type="file" id="file-input" accept="image/*" hidden />
        
        <div class="scanner-overlay" id="scanner-overlay" hidden>
          <div class="scan-line"></div>
        </div>

        <div id="upload-idle">
          <!-- Placeholder for initial view if no photo -->
        </div>

        <div id="upload-preview" hidden>
          <img id="preview-img" src="" alt="Fridge contents" class="preview-img" style="width:100%; height:100%; object-fit:cover;" />
        </div>
      </section>

      <!-- Results/Interaction Panel -->
      <section class="floating-panel">
        <div class="panel-handle"></div>
        
        <div id="initial-state">
          <h2 style="margin-bottom: 8px;">Что в холодильнике?</h2>
          <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px;">Сфотографируй продукты, чтобы получить персональные рецепты</p>
          
          <button class="btn-primary" id="btn-analyze-trigger">
            <i class="fa-solid fa-camera"></i>
            Сделать фото
          </button>
        </div>

        <!-- Analysis State (Hidden initially) -->
        <div id="results-view" hidden>
          <div class="detected-items" id="ingredients-list">
            <!-- Chips injected here -->
          </div>
          
          <div class="recipes-grid" id="recipes-grid">
            <!-- Recipe cards injected here -->
          </div>
        </div>
      </section>
    </main>

    <!-- Navigation -->
    <nav class="app-nav">
      <div class="nav-item active" id="nav-home">
        <i class="fa-solid fa-house"></i>
        <span>Главная</span>
      </div>
      <div class="nav-item" id="nav-history">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <span>История</span>
      </div>
      <div class="nav-item" id="nav-profile">
        <i class="fa-solid fa-circle-user"></i>
        <span>Профиль</span>
      </div>
    </nav>

  </div>

  <!-- Preferences Modal (Simplified for now) -->
  <div id="prefs-modal" hidden>
    <!-- Content logic from app.js -->
  </div>

  <!-- Login Modal -->
  <div class="modal-backdrop" id="auth-modal" hidden>
    <div class="floating-panel" style="margin-top: 200px; border-radius: var(--radius-lg);">
      <h2 style="text-align: center; margin-bottom: 8px;">Войти</h2>
      <p style="text-align: center; color: var(--text-muted); margin-bottom: 32px;">Для сохранения истории рецептов</p>
      
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <a href="/api/auth/google" class="btn-primary" style="background: white; color: black; box-shadow: none;">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" style="margin-right: 8px;" />
          Google
        </a>
        <a href="/api/auth/github" class="btn-primary" style="background: #333; color: white; box-shadow: none;">
          <i class="fa-brands fa-github" style="margin-right: 8px;"></i>
          GitHub
        </a>
      </div>
      
      <button id="btn-close-modal" style="background: none; border: none; color: var(--text-muted); width: 100%; margin-top: 20px; cursor: pointer;">Отмена</button>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
