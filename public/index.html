<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ai-Chef — Умные рецепты</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app-container">
    
    <header class="app-header">
      <div class="brand-logo">Ai-Chef</div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-open-settings" title="Настройки"><i class="fa-solid fa-sliders"></i></button>
      </div>
    </header>

    <!-- 1. HOME VIEW -->
    <main class="app-view active" id="view-home">
      <section class="scanner-viewport" id="upload-zone">
        <input type="file" id="file-input" accept="image/*" hidden />
        <div class="scanner-overlay" id="scanner-overlay" hidden><div class="scan-line"></div></div>
        <img id="preview-img" src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&q=80&w=1000" style="width:100%; height:100%; object-fit:cover; opacity: 0.5;" />
      </section>

      <section class="floating-panel">
        <div class="panel-handle"></div>
        
        <div id="panel-initial">
          <h2 style="margin-bottom: 4px;">Что готовим?</h2>
          <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 16px;">Выберите вайб и загрузите фото</p>
          
          <div class="vibe-row" id="vibe-selector">
            <div class="vibe-chip active" data-vibe="Обычный ужин">🏠 Обычный</div>
            <div class="vibe-chip" data-vibe="Здоровое питание (Фитнес)">💪 Фитнес</div>
            <div class="vibe-chip" data-vibe="Готовлю за 5 минут">⚡ Быстро</div>
            <div class="vibe-chip" data-vibe="Жду гостей">🎉 Гости</div>
            <div class="vibe-chip" data-vibe="Сильное похмелье">🤕 Похмелье</div>
          </div>

          <button class="btn-primary" id="btn-main-action"><i class="fa-solid fa-camera"></i> Сделать фото</button>
        </div>

        <div id="panel-results" hidden>
          <div class="detected-items" id="ingredients-list"></div>
          <div class="recipes-grid" id="recipes-grid"></div>
          <button class="btn-primary" id="btn-reset" style="margin-top:20px; background: var(--bg-secondary); color: var(--accent-green); border: 1px solid #E0E7E0;">
            <i class="fa-solid fa-rotate-left"></i> Новое фото
          </button>
        </div>
      </section>
    </main>

    <!-- 2. HISTORY VIEW -->
    <main class="app-view" id="view-history" style="padding: 24px;">
      <h2 style="margin-bottom: 20px; color: var(--accent-green);">История</h2>
      <div id="history-list" style="color: var(--text-muted); text-align: center; margin-top: 50px;">
        <i class="fa-solid fa-clock-rotate-left" style="font-size: 3rem; opacity: 0.2; margin-bottom: 15px;"></i>
        <p>Ваши прошлые кулинарные шедевры появятся здесь</p>
      </div>
    </main>

    <!-- 3. PROFILE VIEW -->
    <main class="app-view" id="view-profile" style="padding: 24px;">
      <h2 style="margin-bottom: 20px; color: var(--accent-green);">Профиль</h2>
      <div class="recipe-card" style="padding: 24px;">
        <p style="margin-bottom: 20px;">Авторизуйтесь, чтобы сохранять настройки</p>
        <div style="display:flex; flex-direction:column; gap:12px;">
          <a href="/api/auth/google" class="btn-primary" style="background:#fff; color:#000; border:1px solid #ddd;"><i class="fa-brands fa-google"></i> Google</a>
          <a href="/api/auth/github" class="btn-primary" style="background:#333; color:#fff;"><i class="fa-brands fa-github"></i> GitHub</a>
        </div>
      </div>
    </main>

    <nav class="app-nav">
      <div class="nav-item active" data-view="home"><i class="fa-solid fa-house"></i><span>Главная</span></div>
      <div class="nav-item" data-view="history"><i class="fa-solid fa-clock-rotate-left"></i><span>История</span></div>
      <div class="nav-item" data-view="profile"><i class="fa-solid fa-circle-user"></i><span>Профиль</span></div>
    </nav>
  </div>

  <!-- Settings Bottom Sheet -->
  <div class="modal-backdrop" id="modal-settings" hidden>
    <div class="bottom-sheet" id="settings-sheet">
      <div class="sheet-handle"></div>
      <h2 style="margin-bottom: 8px; color: var(--accent-green);">Настройки ИИ</h2>
      <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:24px;">Персонализируйте ваши рецепты</p>
      
      <label style="font-size:0.85rem; color:var(--text-muted); display:block; margin-bottom:6px;">Аллергии (через запятую)</label>
      <input type="text" id="prefs-allergens" class="pref-input" placeholder="Напр: молоко, арахис" />
      
      <label style="font-size:0.85rem; color:var(--text-muted); display:block; margin-bottom:6px;">Не любите / Исключить</label>
      <input type="text" id="prefs-dislikes" class="pref-input" placeholder="Напр: кинза, лук" />
      
      <button class="btn-primary" id="btn-save-settings">Сохранить</button>
      <button id="btn-close-settings" style="background:none; border:none; color:var(--text-muted); width:100%; margin-top:20px; cursor:pointer; font-weight:500;">Отмена</button>
    </div>
  </div>

  <!-- Recipe Detail Bottom Sheet -->
  <div class="modal-backdrop" id="modal-recipe" hidden>
    <div class="bottom-sheet" id="recipe-sheet">
      <div class="sheet-handle"></div>
      <div id="recipe-detail-content">
        <!-- Content injected by JS -->
      </div>
      <button class="btn-primary" id="btn-close-recipe" style="margin-top:20px; background:var(--bg-secondary); color:var(--accent-green); border:1px solid #E0E7E0;">Закрыть</button>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
